name: Close Stale Pull Requests

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  close_stale_prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale pull requests
        uses: actions/stale@v5
        with:
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 30
          days-before-pr-close: 60
          stale-pr-message: 'This pull request has been marked as stale because it has been inactive for more than 30 days. Please update this pull request or close it, it will be automatically closed in 60 days.'
          stale-pr-label: stale
          close-pr-message: 'Closing this PR as it has been marked stale for more than 60 days.'
          close-pr-label: closed-by-stale-bot
          exempt-draft-pr: true
